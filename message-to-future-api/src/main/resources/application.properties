spring.application.name=message-to-future-api
spring.profiles.default=${APP_PROFILE:dev}

server.port=${SERVER_PORT:8090}

# locale config
spring.mvc.locale.resolve=fixed
spring.mvc.locale=pt_BR

security.jwt.secret=${JWT_SECRET:}
security.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:30m}
security.jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:7d}
security.forgot-password.minimum-response-time=${FORGOT_PASSWORD_MINIMUM_RESPONSE_TIME:250ms}
security.forgot-password.rate-limit.window=${FORGOT_PASSWORD_RATE_LIMIT_WINDOW:15m}
security.forgot-password.rate-limit.ip.max-requests=${FORGOT_PASSWORD_RATE_LIMIT_IP_MAX_REQUESTS:10}
security.forgot-password.rate-limit.email.max-requests=${FORGOT_PASSWORD_RATE_LIMIT_EMAIL_MAX_REQUESTS:3}

# Springdoc OpenApi 3.1 & Swagger 3
springdoc.swagger-ui.path=/docs-message-to-future-api.html
springdoc.api-docs.path=/docs-message-to-future-api
springdoc.packagesToScan=com.jacob_araujo.message_to_future_api.web.controller
